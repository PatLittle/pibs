name: Deploy GitHub Pages (pages branch)

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - "spib_en_fr.csv"
      - "infosource_institutions_en_fr.csv"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync dataset files into site payload
        run: |
          mkdir -p site/data
          cp spib_en_fr.csv site/data/spib_en_fr.csv
          cp infosource_institutions_en_fr.csv site/data/infosource_institutions_en_fr.csv

      - name: Deploy to pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: pages
          folder: site
          clean: true

